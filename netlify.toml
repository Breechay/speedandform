[build]
  command = "cd forge && npm install && npm run build"
  publish = "."

# Force Netlify CDN to purge on every deploy
[build.environment]
  NODE_VERSION = "18"

# Context-level cache headers — belt and suspenders alongside _headers file
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# WordPress spam

# Forge React app — SPA catch-all
[[redirects]]
  from = "/forge/*"
  to = "/forge/dist/index.html"
  status = 200

[[redirects]]
