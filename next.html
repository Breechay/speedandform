<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #f5f2ec; --ink: #2a2620; --ink-l: #6b6459; --ink-f: #a09890;
  --line: #d8d2c8; --line-l: #e8e3dc;
}
html, body { height: 100%; }
body {
  background: var(--cream); color: var(--ink);
  font-family: 'Jost', sans-serif; font-weight: 300;
  font-kerning: normal; font-feature-settings: "kern";
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
  padding: 60px 32px;
}

.frame {
  width: 100%; max-width: 400px;
}

/* Eyebrow */
.eyebrow {
  font-size: 8px; font-weight: 500;
  letter-spacing: 0.38em; text-transform: uppercase;
  color: var(--ink-f);
  display: block;
  margin-bottom: 6px;
}

/* Subline */
.subline {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-weight: 300;
  font-size: 16px; letter-spacing: 0.03em;
  color: var(--ink-f);
  display: block;
  margin-bottom: 48px;
}

/* Rule */
.rule {
  width: 100%; height: 1px;
  background: var(--line-l);
  display: block;
  margin-bottom: 40px;
}

/* Body text block */
.body {
  font-size: 13px;
  color: var(--ink-l);
  letter-spacing: 0.02em;
  line-height: 2;
  margin-bottom: 40px;
}
.body p + p { margin-top: 0; }

/* Pause — the hinge */
.pause {
  display: block;
  width: 100%; height: 1px;
  background: var(--line-l);
  margin: 32px 0;
}

/* Transition lines */
.transition {
  font-size: 13px;
  color: var(--ink-l);
  letter-spacing: 0.02em;
  line-height: 2;
  margin-bottom: 40px;
}

/* Offer */
.offer-label {
  font-size: 8px; font-weight: 500;
  letter-spacing: 0.38em; text-transform: uppercase;
  color: var(--ink-f);
  display: block;
  margin-bottom: 16px;
}

.offer-word {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300; font-size: 32px;
  letter-spacing: 0.06em;
  color: var(--ink);
  display: block;
  margin-bottom: 20px;
}

/* CTA button */
.cta {
  display: inline-block;
  font-size: 9px; font-weight: 500;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--cream);
  background: var(--ink);
  text-decoration: none;
  padding: 14px 24px;
  margin-bottom: 40px;
  transition: opacity 0.2s ease;
}
.cta:hover { opacity: 0.78; }

/* Footer */
.footer {
  border-top: 1px solid var(--line-l);
  padding-top: 24px;
}
.footer-text {
  font-size: 11px;
  color: var(--ink-f);
  letter-spacing: 0.04em;
  line-height: 1.8;
}

@media (max-width: 480px) {
  body { padding: 48px 24px; justify-content: flex-start; padding-top: 80px; }
}
</style>
</head>
<body>

<div class="frame">

  <span class="eyebrow">Speed Emergence · Complete</span>
  <span class="subline">Six weeks finished.</span>

  <span class="rule"></span>

  <div class="body">
    <p>You've run the sessions.</p>
    <p>You understand the structure.</p>
    <p>&nbsp;</p>
    <p>Nothing changes.</p>
    <p>The work continues.</p>
  </div>

  <span class="pause"></span>

  <div class="transition">
    <p>Next cycle opens.</p>
    <p>&nbsp;</p>
    <p>Same structure.</p>
    <p>Higher demand.</p>
  </div>

  <span class="offer-label">Next Cycle</span>
  <span class="offer-word">Continue.</span>

  <!-- Payment href: replace with Stripe link or Apple IAP destination when ready -->
  <a class="cta" href="#checkout">Start Next Cycle — $20</a>

  <div class="footer">
    <p class="footer-text">No rush.<br>Join when you're ready.</p>
  </div>

</div>

</body>
