<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --cream:#f5f2ec; --ink:#2a2620; --ink-l:#6b6459; --ink-f:#a09890; --line:#d8d2c8; --line-l:#e8e3dc; --accent:#c4593a; }
html, body { height: auto !important; overflow: visible !important; }
body { background: var(--cream); color: var(--ink); font-family: 'Jost', sans-serif; font-weight: 300; font-kerning: normal; font-feature-settings: "kern"; padding-bottom: 100px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.nav { max-width: 560px; margin: 0 auto; padding: 36px 32px 0; display: flex; align-items: center; justify-content: space-between; }
.nav-home { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 22px; letter-spacing: 0.12em; color: var(--ink); text-decoration: none; }
.nav-label { font-size: 8px; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-f); }
.content { max-width: 560px; margin: 0 auto; padding: 52px 32px 0; border-left: 1px solid var(--line-l); }

/* Search input */
.search-field { display: flex; align-items: baseline; gap: 0; margin-bottom: 28px; border-bottom: 1px solid var(--line); padding-bottom: 10px; }
.search-input { flex: 1; border: none; background: transparent; font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 32px; letter-spacing: 0.04em; color: var(--ink); outline: none; padding: 0; }
.search-input::placeholder { color: var(--line); }
.search-clear { font-size: 9px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-f); background: none; border: none; cursor: pointer; padding: 0; display: none; }
.search-clear:hover { color: var(--ink-l); }

/* Results */
.result-group { margin-bottom: 36px; }
.group-label { font-size: 8px; font-weight: 500; letter-spacing: 0.35em; text-transform: uppercase; color: var(--ink-f); display: block; margin-bottom: 12px; }
.result-item { display: block; padding: 14px 0; border-top: 1px solid var(--line-l); text-decoration: none; }
.result-item:last-child { border-bottom: 1px solid var(--line-l); }
.result-item:hover .result-title { color: var(--ink); }
.result-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
.result-title { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 22px; letter-spacing: 0.03em; color: var(--ink-l); line-height: 1; transition: color 120ms; }
.result-type { font-size: 7px; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-f); flex-shrink: 0; }
.result-desc { font-size: 12px; color: var(--ink-f); letter-spacing: 0.02em; line-height: 1.55; }

/* Empty state */
.empty-state { padding: 32px 0; }
.empty-title { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 22px; color: var(--ink-l); display: block; margin-bottom: 8px; }
.empty-sub { font-size: 12px; color: var(--ink-f); letter-spacing: 0.02em; line-height: 1.65; }
.empty-suggestions { margin-top: 24px; display: flex; flex-wrap: wrap; gap: 8px; }
.suggestion-link { font-size: 9px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-f); text-decoration: none; border: 1px solid var(--line-l); padding: 5px 10px; cursor: pointer; background: none; }
.suggestion-link:hover { color: var(--ink-l); border-color: var(--line); }

/* Idle state */
.idle-state { padding: 4px 0; }

/* Entry block — Ghost Protocol featured */
.entry-block { padding: 20px 0; border-bottom: 1px solid var(--line-l); margin-bottom: 32px; }
.entry-label { font-size: 8px; font-weight: 500; letter-spacing: 0.35em; text-transform: uppercase; color: var(--ink-f); display: block; margin-bottom: 12px; }
.entry-link { display: flex; align-items: baseline; justify-content: space-between; text-decoration: none; margin-bottom: 10px; }
.entry-link:last-child { margin-bottom: 0; }
.entry-name { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 22px; letter-spacing: 0.04em; color: var(--ink-l); }
.entry-desc { font-size: 11px; color: var(--ink-f); letter-spacing: 0.03em; }

/* Section chips */
.section-block { margin-bottom: 28px; }
.section-label { font-size: 8px; font-weight: 500; letter-spacing: 0.35em; text-transform: uppercase; color: var(--ink-f); display: block; margin-bottom: 10px; }
.plain-links { display: flex; flex-wrap: wrap; gap: 0 20px; }
.plain-links a, .plain-links button { font-size: 10px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-f); text-decoration: none; background: none; border: none; cursor: pointer; padding: 0; line-height: 2.4; transition: color 0.12s; font-family: inherit; }
.plain-links a:hover, .plain-links button:hover { color: var(--ink-l); }
.plain-links a.ghost-link { color: var(--ink-l); }

.footer-links { margin-top: 52px; padding-top: 24px; border-top: 1px solid var(--line-l); display: flex; gap: 28px; flex-wrap: wrap; }
.footer-link { font-size: 9px; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-f); text-decoration: none; }
.footer-link:hover { color: var(--ink-l); }

@media (max-width: 480px) {
  .nav { padding-left: 24px; padding-right: 24px; }
  .content { padding-left: 24px; padding-right: 24px; border-left: none; }
  .search-input { font-size: 26px; }
}
</style>
</head>
<body>
<div class="nav">
  <a class="nav-home" href="/">FORM</a>
  <span class="nav-label">Search</span>
</div>
<div class="content">

  <div class="search-field">
    <input class="search-input" id="searchInput" type="text" placeholder="threshold, shoes, sleep…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="search-clear" id="searchClear">Clear</button>
  </div>

  <div id="searchOutput"></div>

  <div class="footer-links">
    <a class="footer-link" href="/library">Library</a>
    <a class="footer-link" href="/practice">Practice</a>
    <a class="footer-link" href="/">Home</a>
  </div>
</div>

<script>
const TYPE_LABELS = { page: 'Page', term: 'Term', tool: 'Tool', reference: 'Reference' };
const GROUP_ORDER = ['best', 'page', 'reference', 'term', 'tool'];
const GROUP_NAMES = { best: 'Best match', page: 'Pages', reference: 'Reference', term: 'Terms', tool: 'Tools' };

let INDEX = [];

async function loadIndex() {
  try {
    const r = await fetch('/search-index.json');
    INDEX = await r.json();
  } catch(e) { INDEX = []; }
}

function score(entry, query) {
  const q = query.toLowerCase().trim();
  const words = q.split(/\s+/);
  let s = 0;
  const titleLower = entry.title.toLowerCase();
  const descLower = (entry.description || '').toLowerCase();
  const keywords = (entry.keywords || []).map(k => k.toLowerCase());
  const synonyms = (entry.synonyms || []).map(k => k.toLowerCase());

  if (titleLower === q) s += 100;
  else if (titleLower.startsWith(q)) s += 60;
  else if (titleLower.includes(q)) s += 40;
  if (keywords.includes(q)) s += 50;
  if (synonyms.includes(q)) s += 30;

  words.forEach(w => {
    if (w.length < 2) return;
    if (titleLower.includes(w)) s += 20;
    if (keywords.some(k => k.includes(w))) s += 15;
    if (synonyms.some(k => k.includes(w))) s += 8;
    if (descLower.includes(w)) s += 5;
  });

  if (entry.type === 'term' && s >= 20) s += 10;
  return s;
}

function groupResults(scored) {
  const groups = { best: [], page: [], reference: [], term: [], tool: [] };
  const seen = new Set();
  const top = scored[0];
  if (top && top.score >= 30) { groups.best.push(top); seen.add(top.entry.url); }
  scored.forEach(r => {
    if (seen.has(r.entry.url)) return;
    if (r.score < 8) return;
    const t = r.entry.type || 'page';
    if (groups[t]) groups[t].push(r);
    seen.add(r.entry.url);
  });
  return groups;
}

function renderResult(r) {
  const e = r.entry;
  const label = TYPE_LABELS[e.type] || 'Page';
  return `<a class="result-item" href="${e.url}">
    <div class="result-header">
      <span class="result-title">${e.title}</span>
      <span class="result-type">${label}</span>
    </div>
    <span class="result-desc">${e.description || ''}</span>
  </a>`;
}

function renderGroups(groups) {
  let html = '';
  GROUP_ORDER.forEach(key => {
    const items = groups[key];
    if (!items || items.length === 0) return;
    html += `<div class="result-group">
      <span class="group-label">${GROUP_NAMES[key]}</span>
      ${items.map(renderResult).join('')}
    </div>`;
  });
  return html;
}

function search(query) {
  if (!query.trim()) { renderIdle(); return; }
  const scored = INDEX
    .map(entry => ({ entry, score: score(entry, query) }))
    .filter(r => r.score > 0)
    .sort((a, b) => b.score - a.score);
  const out = document.getElementById('searchOutput');
  if (scored.length === 0) {
    out.innerHTML = `<div class="empty-state">
      <span class="empty-title">No match for &ldquo;${query}&rdquo;</span>
      <p class="empty-sub">Try a related term, or start with Ghost Protocol for running mechanics.</p>
      <div class="empty-suggestions">
        ${['ghost','threshold','shoes','sleep','long run','injury','cadence','lean'].map(s =>
          `<button class="suggestion-link" onclick="fillSearch('${s}')">${s}</button>`
        ).join('')}
      </div>
    </div>`;
    return;
  }
  const groups = groupResults(scored);
  out.innerHTML = renderGroups(groups);
}

function renderIdle() {
  document.getElementById('searchOutput').innerHTML = `
    <div class="idle-state">

      <div class="entry-block">
        <span class="entry-label">Start here</span>
        <a class="entry-link" href="/ghost">
          <span class="entry-name">Ghost Protocol</span>
          <span class="entry-desc">Six-week mechanics practice</span>
        </a>
        <a class="entry-link" href="/the-method">
          <span class="entry-name">The Method</span>
          <span class="entry-desc">How the practice is organized</span>
        </a>
        <a class="entry-link" href="/training-arc">
          <span class="entry-name">Training Arc</span>
          <span class="entry-desc">Where you are in development</span>
        </a>
      </div>

      <div class="section-block">
        <span class="section-label">Sessions</span>
        <div class="plain-links">
          <a href="/threshold">Threshold</a>
          <a href="/long-run">Long Run</a>
          <a href="/easy-run">Easy Run</a>
          <a href="/sessions">Sessions</a>
        </div>
      </div>

      <div class="section-block">
        <span class="section-label">Movement</span>
        <div class="plain-links">
          <a class="ghost-link" href="/ghost">Ghost Protocol</a>
          <a href="/ghost/cues">Cues</a>
          <a href="/mobility">Mobility</a>
          <a href="/strength">Structural Work</a>
        </div>
      </div>

      <div class="section-block">
        <span class="section-label">Reference</span>
        <div class="plain-links">
          <button onclick="fillSearch('shoes')">Shoes</button>
          <button onclick="fillSearch('injury')">Injury</button>
          <button onclick="fillSearch('sleep')">Sleep</button>
          <button onclick="fillSearch('fueling')">Fueling</button>
          <button onclick="fillSearch('cadence')">Cadence</button>
          <button onclick="fillSearch('pacing')">Pacing</button>
          <button onclick="fillSearch('race')">Race</button>
        </div>
      </div>

    </div>`;
}

function fillSearch(term) {
  const input = document.getElementById('searchInput');
  input.value = term;
  input.focus();
  document.getElementById('searchClear').style.display = '';
  search(term);
  const url = new URL(window.location);
  url.searchParams.set('q', term);
  history.replaceState({}, '', url);
}

loadIndex().then(() => {
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q') || '';
  const input = document.getElementById('searchInput');
  if (q) {
    input.value = q;
    document.getElementById('searchClear').style.display = '';
    search(q);
  } else {
    renderIdle();
  }
  let debounce;
  input.addEventListener('input', () => {
    const val = input.value.trim();
    document.getElementById('searchClear').style.display = val ? '' : 'none';
    clearTimeout(debounce);
    debounce = setTimeout(() => {
      const url = new URL(window.location);
      if (val) url.searchParams.set('q', val); else url.searchParams.delete('q');
      history.replaceState({}, '', url);
      search(val);
    }, 120);
  });
  document.getElementById('searchClear').addEventListener('click', () => {
    input.value = '';
    document.getElementById('searchClear').style.display = 'none';
    const url = new URL(window.location);
    url.searchParams.delete('q');
    history.replaceState({}, '', url);
    renderIdle();
    input.focus();
  });
  input.focus();
});
</script>
</body>
</html>
