<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="deploy-id" content="202603161318">
<link rel="icon" type="image/x-icon" href="/favicon.ico">

<title>FORM — Athlete</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --cream:#f5f2ec; --ink:#2a2620; --ink-l:#6b6459; --ink-f:#a09890; --accent:#c4593a; --line:#d8d2c8; --line-l:#e8e3dc; }
html, body { height: auto !important; overflow: visible !important; }
body { background: var(--cream); color: var(--ink); font-family: 'Jost', sans-serif; font-weight: 300; font-kerning: normal; font-feature-settings: "kern"; padding: 0 0 120px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.nav { max-width: 560px; margin: 0 auto; padding: 36px 32px 0; display: flex; align-items: center; justify-content: space-between; }
.nav-home { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 22px; letter-spacing: 0.12em; color: var(--ink); text-decoration: none; }
.nav-label { font-size: 8px; font-weight: 500; letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-f); }
.content { max-width: 560px; margin: 0 auto; padding: 64px 32px 0; border-left: 1px solid var(--line-l); }
.page-title { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 52px; letter-spacing: 0.04em; color: var(--ink); line-height: 1; margin-bottom: 8px; }
.athlete-meta { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-f); margin-bottom: 52px; display: block; }
.section-label { font-size: 8px; font-weight: 500; letter-spacing: 0.35em; text-transform: uppercase; color: var(--ink-f); display: block; margin-bottom: 20px; }
/* Threshold table */
.threshold-table { width: 100%; border-collapse: collapse; }
.threshold-table thead tr { border-bottom: 1px solid var(--line); }
.threshold-table th { font-size: 8px; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-f); padding: 0 0 12px; text-align: left; }
.threshold-table th:last-child { text-align: right; }
.threshold-table tbody tr { border-bottom: 1px solid var(--line-l); }
.threshold-table td { padding: 14px 0; font-size: 13px; color: var(--ink-l); letter-spacing: 0.02em; vertical-align: top; }
.threshold-table td:last-child { text-align: right; }
.td-session { font-size: 11px; color: var(--ink-f); display: block; margin-top: 2px; }
.td-pb { font-weight: 500; color: var(--ink); }
.td-skip { color: var(--line); font-size: 12px; }
.no-data { font-size: 13px; color: var(--ink-f); font-style: italic; font-family: 'Cormorant Garamond', serif; padding: 20px 0; }
.rule { width: 100%; height: 1px; background: var(--line-l); margin: 52px 0; }
/* Race section */
.race-block { padding: 20px 0; border-top: 1px solid var(--line-l); }
.race-block:last-of-type { border-bottom: 1px solid var(--line-l); }
.race-date { font-size: 9px; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-f); display: block; margin-bottom: 4px; }
.race-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; color: var(--ink); display: block; margin-bottom: 4px; text-decoration: none; }
.race-name:hover { color: var(--ink-l); }
.race-detail { font-size: 12px; color: var(--ink-f); letter-spacing: 0.03em; }
.race-result { font-size: 13px; font-weight: 500; color: var(--ink); margin-left: 8px; }
.loading { font-size: 11px; color: var(--ink-f); letter-spacing: 0.1em; text-transform: uppercase; padding: 20px 0; }




@media (max-width: 480px) {
  .nav { padding-left: 24px; padding-right: 24px; }
  .content { padding-left: 24px; padding-right: 24px; border-left: none; }
  .page-title { font-size: 40px; }
}
</style>
<meta property="og:image" content="https://speedandform.com/og/default.jpg">
<meta property="og:image:width" content="1200">

<body>
<div class="nav">
  <a class="nav-home" href="/">FORM</a>
  <span class="nav-label">Athletes</span>
</div>
<div class="content">
  <h1 class="page-title" id="ath-name">—</h1>
  <span class="athlete-meta" id="ath-meta">Loading…</span>

  <div id="current-session-wrap" style="display:none;"></div>

  <span class="section-label">Threshold · Spring Cycle 2026</span>
  <div id="threshold-wrap"><div class="loading">Loading…</div></div>

  <div class="rule"></div>

  <span class="section-label">Competition</span>
  <div id="races-wrap"><div class="loading">Loading…</div></div>

  <div id="form-footer"></div>
</div>

<script>
const SB  = 'https://zlhxvzgublgtuxplcjjl.supabase.co/rest/v1/';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpsaHh2emd1YmxndHV4cGxjampsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODIxMTksImV4cCI6MjA4ODE1ODExOX0.DGEmk1QaAx-CPYkNiHf5BTMI6DKFKp7Wr40fShGv0hc';
const H   = { 'apikey': KEY, 'Authorization': 'Bearer ' + KEY };

// Session descriptions — matches plan
const SESSION_NAMES = {
  1: '3 × 10 min',
  2: '2 × 14 min',
  3: '20 + 8',
  4: '3 × 12 min',
  5: '2 × 15 min',
  6: '25 min continuous',
  7: '3 × 14 min',
  8: '20 + 12'
};

// Athlete config — slug → { name, skipLabel? }
const ATHLETES = {
  'breech':  { name: 'Breech' },
  'simon':   { name: 'Simon' },
  'sam-p':   { name: 'Sam P.', skipLabel: 'Race Week' },
  'marcus':  { name: 'Marcus', skipLabel: 'Race Prep' },
  'kyle':    { name: 'Kyle',   skipLabel: 'Off Season' },
  'megan':   { name: 'Megan' },
  'jose':    { name: 'José' },
  'lisa':    { name: 'Lisa' },
  'bobby':   { name: 'Bobby',  skipLabel: 'Race Week' },
  'ryan':    { name: 'Ryan',   skipLabel: 'Race Week' },
  'mike':    { name: 'Mike' },
  'tinius':  { name: 'Tinius', skipLabel: 'Off Season' },
  'sam-v':   { name: 'Sam V.' },
};

// SCHEDULE — same source of truth as homepage
const SCHEDULE = [
  { type:'threshold', date:'2026-02-17', desc:'3 × 10 min' },
  { type:'threshold', date:'2026-02-24', desc:'2 × 14 min' },
  { type:'threshold', date:'2026-03-03', desc:'20 + 8 continuous' },
  { type:'threshold', date:'2026-03-10', desc:'3 × 12 min' },
  { type:'threshold', date:'2026-03-17', desc:'2 × 15 min' },
  { type:'threshold', date:'2026-03-24', desc:'20 + 12 continuous' },
  { type:'threshold', date:'2026-03-31', desc:'3 × 8 min' },
  { type:'threshold', date:'2026-04-07', desc:'2 × 8 min' },
  { type:'longrun', date:'2026-02-21', desc:'95 min · 50 easy / 45 steady' },
  { type:'longrun', date:'2026-02-28', desc:'95 min · 50 easy / 45 steady' },
  { type:'longrun', date:'2026-03-07', desc:'100 min · 50 easy / 50 steady' },
  { type:'longrun', date:'2026-03-14', desc:'90 min · 60 easy / 30 steady' },
  { type:'longrun', date:'2026-03-21', desc:'95 min · 45 easy / 40 steady' },
  { type:'longrun', date:'2026-03-28', desc:'90 min · 40 easy / 40 steady' },
  { type:'longrun', date:'2026-04-04', desc:'75 min · 40 easy / 20 steady' },
  { type:'longrun', date:'2026-04-11', desc:'Off or shakeout + strides' },
];
function _getMonday(d) {
  const dt = new Date(d); const dow = dt.getDay();
  dt.setDate(dt.getDate() + (dow === 0 ? -6 : 1 - dow)); dt.setHours(0,0,0,0); return dt;
}
function _toYMD(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

function renderCurrentSession() {
  const wrap = document.getElementById('current-session-wrap');
  if (!wrap) return;
  const mon = _getMonday(new Date());
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  const monYMD = _toYMD(mon), sunYMD = _toYMD(sun);
  let threshold = null, longrun = null;
  for (const s of SCHEDULE) {
    if (s.date >= monYMD && s.date <= sunYMD) {
      if (s.type === 'threshold') threshold = s;
      if (s.type === 'longrun')   longrun   = s;
    }
  }
  if (!threshold && !longrun) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  let html = '<div style="padding:0 0 28px"><span style="font-size:8px;font-weight:500;letter-spacing:.35em;text-transform:uppercase;color:var(--ink-f);display:block;margin-bottom:10px;">This Week</span>';
  if (threshold) html += `<span style="font-family:\'Cormorant Garamond\',serif;font-size:22px;font-weight:300;color:var(--ink);display:block;margin-bottom:4px;">Threshold · ${threshold.desc}</span>`;
  if (longrun)   html += `<span style="font-family:\'Cormorant Garamond\',serif;font-size:22px;font-weight:300;color:var(--ink-l);display:block;">Long Run · ${longrun.desc}</span>`;
  html += '</div>';
  wrap.innerHTML = html;
}

function getSlug() {
  const parts = window.location.pathname.split('/');
  return parts[parts.length - 1] || parts[parts.length - 2];
}

function formatDate(d) {
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const parts = d.split('-');
  const dt = new Date(parts[0], parseInt(parts[1])-1, parts[2]);
  return `${months[dt.getMonth()]} ${dt.getDate()}, ${dt.getFullYear()}`;
}

function renderThreshold(times, skipLabel) {
  if (!times.length) {
    document.getElementById('threshold-wrap').innerHTML = '<div class="no-data">No sessions logged yet.</div>';
    return;
  }
  const isSkipVal = v => !v || v === 'x' || v === '×' || v === 'race';
  const numeric = times.filter(t => t.time && !isSkipVal(t.time) && /^\d+:\d+/.test(t.time));
  let pb = null;
  if (numeric.length) {
    pb = numeric.reduce((best, t) => {
      const toSec = s => { const p = s.split(':'); return parseInt(p[0])*60 + parseFloat(p[1]); };
      return toSec(t.time) < toSec(best.time) ? t : best;
    });
  }
  const rows = times.sort((a,b) => a.week - b.week).map(t => {
    const skip = isSkipVal(t.time);
    const isPB = pb && t.week === pb.week && !skip;
    const tdClass = skip ? (skipLabel ? 'td-skip-label' : 'td-skip') : isPB ? 'td-pb' : '';
    const tdText  = skip ? (skipLabel || '×') : t.time;
    return `<tr>
      <td>S${String(t.week).padStart(2,'0')}<span class="td-session">${SESSION_NAMES[t.week] || ''}</span></td>
      <td class="${tdClass}">${tdText}${isPB ? ' ·' : ''}</td>
    </tr>`;
  }).join('');
  document.getElementById('threshold-wrap').innerHTML = `
    <table class="threshold-table">
      <thead><tr><th>Session</th><th>Time</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function renderRaces(races) {
  const wrap = document.getElementById('races-wrap');
  if (!races.length) {
    wrap.innerHTML = '<div class="no-data">No races scheduled.</div>';
    return;
  }
  const today = new Date().toISOString().split('T')[0];
  wrap.innerHTML = races.sort((a,b) => a.date.localeCompare(b.date)).map(r => {
    const past = r.date < today;
    return `<div class="race-block">
      <span class="race-date">${formatDate(r.date)}</span>
      <a class="race-name" href="/competition">${r.name}</a>
      <span class="race-detail">${r.location}${past && r.result ? ` <span class="race-result">${r.result}</span>` : !past && r.target ? ` · target ${r.target}` : ''}</span>
    </div>`;
  }).join('');
}

async function load() {
  const slug = getSlug();
  const athlete = ATHLETES[slug];
  if (!athlete) {
    document.getElementById('ath-name').textContent = 'Athlete not found';
    document.getElementById('ath-meta').textContent = '';
    document.getElementById('threshold-wrap').innerHTML = '';
    document.getElementById('races-wrap').innerHTML = '';
    return;
  }
  const name = athlete.name;
  const skipLabel = athlete.skipLabel || null;
  document.title = `FORM — ${name}`;
  document.getElementById('ath-name').textContent = name;
  document.querySelector('.nav-label').textContent = name;
  renderCurrentSession();

  try {
    const athKey = encodeURIComponent(`group_${name}`);
    const [tRes, rRes, aRes] = await Promise.all([
      fetch(`${SB}threshold_times?athlete=eq.${athKey}&order=week.asc`, { headers: H }),
      fetch(`${SB}races?athlete=eq.${encodeURIComponent(name)}&order=date.asc`, { headers: H }),
      fetch(`${SB}athletes?slug=eq.${slug}`, { headers: H })
    ]);
    const times  = await tRes.json();
    const races  = await rRes.json();
    const athRow = await aRes.json();
    const joined = athRow[0]?.joined || 'Spring 2026';
    document.getElementById('ath-meta').textContent = `FORM · ${joined}`;
    renderThreshold(Array.isArray(times) ? times : [], skipLabel);
    renderRaces(Array.isArray(races) ? races : []);
  } catch(e) {
    document.getElementById('ath-meta').textContent = 'FORM · Spring 2026';
    document.getElementById('threshold-wrap').innerHTML = '<div class="no-data">Could not load session data.</div>';
    document.getElementById('races-wrap').innerHTML = '<div class="no-data">Could not load race data.</div>';
  }
}

load();
</script>
<script src="https://zlhxvzgublgtuxplcjjl.supabase.co/storage/v1/object/public/scripts/form-shell.js"></script>

</body>
