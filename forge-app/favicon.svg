<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 32" fill="none">
  <!-- ForgeMark: 5 bars, bottom-aligned, ascending left to right -->
  <!-- Bar heights based on ForgeMark.swift: position 0..4 → scale 0.35+(pos/4*0.45) -->
  <!-- Bar 0: 0.35 → 11.2px, Bar 1: 0.46 → 14.8, Bar 2: 0.58 → 18.5, Bar 3: 0.69 → 22.1, Bar 4: 0.80 → 25.6 -->
  <!-- All bars bottom-aligned. barWidth = height*0.16 = ~5.1, gap = barWidth*0.75 = ~3.8 -->
  <rect x="0"    y="20.8" width="5" height="11.2" rx="2.5" fill="#8C6029"/>
  <rect x="8.8"  y="17.2" width="5" height="14.8" rx="2.5" fill="#8C6029"/>
  <rect x="17.5" y="13.5" width="5" height="18.5" rx="2.5" fill="#8C6029"/>
  <rect x="26.3" y="9.9"  width="5" height="22.1" rx="2.5" fill="#8C6029"/>
  <rect x="35"   y="6.4"  width="5" height="25.6" rx="2.5" fill="#8C6029"/>
</svg>
